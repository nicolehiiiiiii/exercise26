<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS 圖片樣式練習 - 修正版</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            background-color: #fff;
        }

        /* 統一設定左右兩側圖片的容器尺寸 */
        .img-box {
            width: 33%;
            height: 300px;
        }

        /* 左側圖片：不失真 (使用 object-fit: cover) */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* 關鍵：裁切並保持比例，不失真 */
        }

        /* 中間圖片：圓形、固定 150px、不失真 */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid #000;
            object-fit: cover;
        }

        /* 右側圖片：失真 (預設行為或使用 object-fit: fill) */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 關鍵：強制拉伸填滿，會導致失真 */
        }
    </style>
</head>
<body>

    <img src="https://picsum.photos/id/1011/600/800" alt="Left Image" class="img-left">

    <img src="https://picsum.photos/id/1015/400/400" alt="Center Image" class="img-center">

    <img src="https://picsum.photos/id/1011/600/800" alt="Right Image" class="img-right">

</body>
</html>
